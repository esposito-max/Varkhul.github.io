<header class="gm-header"><a class="gm-brand" href="/dm.html"><img src="./assets/varkhul-mark.png" alt="" width="44" height="52"><span><small>Chronicle &amp; Character</small><strong>Game Master</strong></span></a><nav class="gm-nav" aria-label="GM navigation"><a data-gm-tab="home" href="/dm.html">Homepage</a><a data-gm-tab="lore" href="/dm-lore.html">Lore</a><a data-gm-tab="campaigns" href="/dm-campaigns.html">Campaigns</a><a data-gm-tab="resources" href="/dm-resources.html">Resources</a></nav><div class="gm-header-actions"><a class="secondary-button button-link" href="/player.html">Player Side</a><button id="theme-toggle" class="theme-toggle compact" type="button">Use Light Mode</button><button class="secondary-button auth-logout-button" type="button" data-auth-logout>Logout</button></div></header>
<main class="gm-main"><header class="page-header"><div><p class="eyebrow">Campaign Management</p><h1>Campaigns</h1><p class="lead">Create campaigns and open their dedicated management panels.</p></div><button id="create-campaign-button" class="primary-button" type="button">Create Campaign</button></header><section id="gm-campaign-grid" class="campaign-card-grid"><div class="empty-state">Loading campaigns...</div></section></main>
