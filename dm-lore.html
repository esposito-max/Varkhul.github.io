<!doctype html><html lang="en" data-theme="dark"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Lore — Chronicle & Character</title><link rel="stylesheet" href="/styles.css"></head>
<body class="gm-body">
<header class="gm-header"><a class="gm-brand" href="/dm.html"><img src="/assets/varkhul-mark.png" alt="" width="44" height="52"><span><small>Chronicle &amp; Character</small><strong>Game Master</strong></span></a><nav class="gm-nav" aria-label="GM navigation"><a data-gm-tab="home" href="/dm.html">Homepage</a><a data-gm-tab="lore" href="/dm-lore.html">Lore</a><a data-gm-tab="campaigns" href="/dm-campaigns.html">Campaigns</a><a data-gm-tab="resources" href="/dm-resources.html">Resources</a></nav><div class="gm-header-actions"><a class="secondary-button button-link" href="/player.html">Player Side</a><button id="theme-toggle" class="theme-toggle compact" type="button">Use Light Mode</button><button class="secondary-button auth-logout-button" type="button" data-auth-logout>Logout</button></div></header>
<main class="gm-main gm-lore-page">
<header class="page-header"><div><p class="eyebrow">Archive Authoring</p><h1>Lore</h1><p class="lead">Write, import, privately save, or publish Markdown documents.</p></div><button id="new-lore-button" class="secondary-button" type="button">New Document</button></header>
<div class="gm-lore-layout">
  <aside class="panel gm-lore-library"><form id="gm-lore-search-form"><input id="gm-lore-search" type="search" placeholder="Search lore"><select id="gm-lore-scope"><option value="">All types</option><option value="general">General Lore</option><option value="campaign">Campaign Lore</option><option value="personal">Personal Lore</option></select><button class="secondary-button" type="submit">Search</button></form><div id="gm-lore-list"><div class="empty-state">Loading library...</div></div></aside>
  <section class="panel gm-markdown-workspace">
    <div class="gm-editor-toolbar"><label class="secondary-button file-button">Upload Markdown<input id="markdown-file-input" type="file" accept=".md,text/markdown"></label><button id="download-markdown-button" class="secondary-button" type="button">Download File</button><button id="save-personal-button" class="secondary-button" type="button">Save as Personal Lore</button><button id="publish-lore-button" class="primary-button" type="button">Save and Publish</button></div>
    <div class="gm-editor-fields"><label>Working Name<input id="working-name" placeholder="Document name"></label><label>Working File ID<input id="working-file-id" placeholder="stable-file-id"></label></div>
    <div class="gm-editor-split"><textarea id="markdown-editor" spellcheck="true" placeholder="# Lore document"></textarea><article id="markdown-preview" class="lore-content gm-markdown-preview"><p class="muted">Preview appears here.</p></article></div>
    <div id="gm-lore-feedback" aria-live="polite"></div>
  </section>
</div>
</main>
<dialog id="publish-lore-dialog" class="gm-dialog"><form id="publish-lore-form" class="gm-form-dialog"><div class="dialog-title-row"><div><p class="eyebrow">Publication Metadata</p><h2>Save and Publish</h2></div><button type="button" class="icon-button" data-close-publish aria-label="Close">×</button></div><label>Name of the File<input name="name" required></label><label>File ID<input name="fileId" required pattern="[A-Za-z0-9_-]+"></label><label>Type of Lore<select name="scope" required><option value="general">General Lore</option><option value="campaign">Campaign Lore</option></select></label><label id="publish-campaign-field" hidden>Campaign<select name="campaignId"></select></label><label id="insert-notes-field" class="checkbox-line" hidden><input name="insertIntoPlayerNotes" type="checkbox"> Insert into players’ campaign notes?</label><label>Date of the Events <small>Optional in-universe date</small><input name="eventDate"></label><label>Factions Involved <small>Optional, comma-separated</small><input name="factions"></label><div id="publish-lore-feedback"></div><div class="dialog-action-row"><button type="button" class="secondary-button" data-close-publish>Cancel</button><button class="primary-button" type="submit">Save and Publish</button></div></form></dialog>
<script src="/runtime-config.js"></script>
  <script type="module" src="/dm-lore.js"></script></body></html>
