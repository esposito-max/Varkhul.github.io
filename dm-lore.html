<!doctype html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Editor de lore de Chronicle & Character">
  <title>Lore — Chronicle &amp; Character</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body class="gm-body">
  <header class="gm-header"><a class="gm-brand" href="./dm.html"><img src="./assets/varkhul-mark.png" alt="" width="44" height="52"><span><small>Chronicle &amp; Character</small><strong>Mestre</strong></span></a><nav class="gm-nav" aria-label="Navegação do Mestre"><a data-gm-tab="home" href="./dm.html">Início</a><a data-gm-tab="lore" href="./dm-lore.html">Lore</a><a data-gm-tab="campaigns" href="./dm-campaigns.html">Campanhas</a><a data-gm-tab="resources" href="./dm-resources.html">Recursos</a></nav><div class="gm-header-actions"><a class="secondary-button button-link" href="./player.html" data-area-switch="player">Área do jogador</a><button id="theme-toggle" class="theme-toggle compact" type="button">Usar tema claro</button><button class="secondary-button auth-logout-button" type="button" data-auth-logout>Sair</button></div></header>
  <main class="gm-main gm-lore-page">
    <header class="page-header"><div><p class="eyebrow">Arquivo de Varkhul</p><h1>Lore</h1><p class="lead">Escreva, importe, salve de forma privada ou publique documentos em Markdown.</p></div><button id="new-lore-button" class="secondary-button" type="button">Novo documento</button></header>
    <div class="gm-lore-layout">
      <aside class="panel gm-lore-library"><form id="gm-lore-search-form"><input id="gm-lore-search" type="search" placeholder="Pesquisar lore" aria-label="Pesquisar documentos de lore"><select id="gm-lore-scope" aria-label="Filtrar por tipo de lore"><option value="">Todos os tipos</option><option value="general">Lore geral</option><option value="campaign">Lore da campanha</option><option value="personal">Lore pessoal</option></select><button class="secondary-button" type="submit">Pesquisar</button></form><div id="gm-lore-list" aria-live="polite"><div class="empty-state">Carregando biblioteca...</div></div></aside>
      <section class="panel gm-markdown-workspace">
        <div class="gm-editor-toolbar"><label class="secondary-button file-button">Importar Markdown<input id="markdown-file-input" type="file" accept=".md,text/markdown"></label><button id="download-markdown-button" class="secondary-button" type="button">Baixar arquivo</button><button id="save-personal-button" class="secondary-button" type="button">Salvar como lore pessoal</button><button id="publish-lore-button" class="primary-button" type="button">Salvar e publicar</button></div>
        <div class="gm-editor-fields"><label>Nome do documento<input id="working-name" placeholder="Nome do documento"></label><label>Identificador do arquivo<input id="working-file-id" placeholder="identificador-estavel"></label></div>
        <div class="gm-editor-split"><textarea id="markdown-editor" aria-label="Conteúdo do documento em Markdown" spellcheck="true" placeholder="# Documento de lore"></textarea><article id="markdown-preview" class="lore-content gm-markdown-preview"><p class="muted">A prévia aparecerá aqui.</p></article></div>
        <div id="gm-lore-feedback" aria-live="polite"></div>
      </section>
    </div>
  </main>
  <dialog id="publish-lore-dialog" class="gm-dialog">
    <form id="publish-lore-form" class="gm-form-dialog">
      <div class="dialog-title-row"><div><p class="eyebrow">Dados de publicação</p><h2>Salvar e publicar</h2></div><button type="button" class="icon-button" data-close-publish aria-label="Fechar">×</button></div>
      <label>Nome do documento<input name="name" required maxlength="160"></label>
      <label>Identificador do arquivo<input name="fileId" required pattern="[A-Za-z0-9_-]+" maxlength="160"></label>
      <label>Tipo de lore<select name="scope" required><option value="general">Lore geral</option><option value="campaign">Lore da campanha</option></select></label>
      <label id="publish-campaign-field" hidden>Campanha<select name="campaignId"></select></label>
      <label id="insert-notes-field" class="checkbox-line" hidden><input name="insertIntoPlayerNotes" type="checkbox"> Inserir um link nas anotações compartilhadas da campanha</label>
      <label>Data dos eventos <small>Data interna opcional</small><input name="eventDate"></label>
      <label>Facções envolvidas <small>Opcional; separe por vírgulas</small><input name="factions"></label>
      <div id="publish-lore-feedback" aria-live="polite"></div>
      <div class="dialog-action-row"><button type="button" class="secondary-button" data-close-publish>Cancelar</button><button class="primary-button" type="submit">Publicar lore</button></div>
    </form>
  </dialog>
  <script src="./runtime-config.js"></script>
  <script type="module" src="./dm-lore.js"></script>
</body>
</html>
