<!doctype html>
<html lang="pt-BR" data-theme="dark">

    <button id="theme-toggle" class="theme-toggle compact" type="button">Alternar tema</button>
    <button class="secondary-button auth-logout-button" type="button" data-auth-logout>Sair</button>
  </header>
  <div id="lore-page-layout" class="inner-page-layout">
    <aside id="lore-sidebar" class="sidebar player-sidebar inner-sidebar">
